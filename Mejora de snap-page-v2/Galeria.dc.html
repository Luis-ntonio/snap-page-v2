<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Gloock&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<script src="./image-slot.js"></script>
<style>
  body { margin:0; background:#FBF7F2; color:#2B211C; font-family:'Raleway',sans-serif; -webkit-font-smoothing:antialiased; }
  a { color:#7B3A1E; } a:hover { color:#E8795A; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
</style>
</helmet>

<div data-screen-label="Galeria" style="min-height:100vh; display:flex; flex-direction:column;">

  <header style="background:rgba(251,247,242,0.92); backdrop-filter:blur(8px); border-bottom:1px solid #EADFD3; position:sticky; top:0; z-index:50;">
    <div style="max-width:1140px; margin:0 auto; padding:0 32px; height:64px; display:flex; align-items:center; position:relative;">
      <nav style="display:flex; gap:32px; flex:1;">
        <a href="Home.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.16em; text-decoration:none; color:#8A7568;">INICIO</a>
        <a href="Planes.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.16em; text-decoration:none; color:#8A7568;">PLANES</a>
        <a href="Plantillas.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.16em; text-decoration:none; color:#8A7568;">PLANTILLAS</a>
      </nav>
      <a href="Home.dc.html" style="position:absolute; left:50%; transform:translateX(-50%); text-decoration:none; display:flex; align-items:baseline; gap:6px; white-space:nowrap;">
        <span style="font-family:'Gloock',serif; font-size:24px; color:#7B3A1E;">Snap</span>
        <span style="color:#E8795A; font-size:18px;">✳</span>
        <span style="font-family:'Gloock',serif; font-size:24px; color:#2B211C;">Page</span>
      </a>
      <nav style="display:flex; gap:28px; flex:1; justify-content:flex-end; align-items:center;">
        <a href="Galeria.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.16em; text-decoration:none; color:#2B211C;">GALERÍA</a>
        <a href="Login.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.16em; text-decoration:none; color:#8A7568;">INGRESAR</a>
        <a href="Planes.dc.html" style="font-size:12px; font-weight:700; letter-spacing:0.12em; text-decoration:none; color:#FBF7F2; background:#7B3A1E; padding:10px 20px; border-radius:999px; transition:background 0.2s;" style-hover="background:#E8795A; color:#FBF7F2;">CREA EL TUYO</a>
      </nav>
    </div>
  </header>

  <section style="padding:64px 32px 36px; text-align:center;">
    <p style="font-family:'Caveat',cursive; font-size:26px; color:#E8795A; margin:0 0 8px; transform:rotate(-1deg);">historias que ya viven en papel</p>
    <h1 style="font-family:'Gloock',serif; font-size:clamp(2.2rem,4vw,3.2rem); margin:0 0 12px;">Galería</h1>
    <p style="font-size:15px; color:#6E5D52; margin:0;">Photobooks reales, hechos para clientes reales.</p>
  </section>

  <!-- Filtros -->
  <div style="display:flex; justify-content:center; gap:8px; padding:0 32px 40px; flex-wrap:wrap;">
    <sc-for list="{{ filtros }}" as="f" hint-placeholder-count="5">
      <button style="font-size:11.5px; font-weight:800; letter-spacing:0.12em; padding:10px 22px; border-radius:999px; border:1.5px solid {{ f.borde }}; background:{{ f.bg }}; color:{{ f.color }}; cursor:pointer; transition:all 0.2s;" onClick="{{ f.elegir }}">{{ f.label }}</button>
    </sc-for>
  </div>

  <!-- Masonry -->
  <section style="padding:0 32px 88px; flex:1;">
    <div style="max-width:1080px; margin:0 auto; columns:3; column-gap:22px;">
      <sc-for list="{{ items }}" as="it" hint-placeholder-count="9">
        <div style="break-inside:avoid; margin-bottom:22px; background:#fff; padding:9px 9px 30px; box-shadow:0 10px 26px rgba(75,46,26,0.13); transform:rotate({{ it.rot }}deg); transition:transform 0.25s, box-shadow 0.25s; cursor:pointer;" style-hover="transform:rotate(0deg) translateY(-4px); box-shadow:0 18px 40px rgba(75,46,26,0.2);">
          <div style="width:100%; height:{{ it.h }}px;"><image-slot id="{{ it.slotId }}" shape="rect" placeholder="{{ it.ph }}"></image-slot></div>
          <p style="font-family:'Caveat',cursive; font-size:20px; text-align:center; margin:10px 0 0; color:#6E5D52;">{{ it.caption }}</p>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- CTA -->
  <section style="background:#F3E8DC; padding:56px 32px; text-align:center;">
    <p style="font-family:'Caveat',cursive; font-size:24px; color:#7B3A1E; margin:0 0 8px;">el siguiente puede ser el tuyo</p>
    <h2 style="font-family:'Gloock',serif; font-size:clamp(1.6rem,2.6vw,2.1rem); margin:0 0 22px;">Empieza tu photobook hoy</h2>
    <a href="Planes.dc.html" style="font-size:12.5px; font-weight:800; letter-spacing:0.1em; text-decoration:none; color:#FBF7F2; background:#E8795A; padding:15px 32px; border-radius:999px; display:inline-block; box-shadow:0 8px 22px rgba(232,121,90,0.32); transition:transform 0.2s;" style-hover="transform:translateY(-2px); color:#FBF7F2;">VER PLANES</a>
  </section>

  <footer style="background:#2B211C; color:#8A7568; padding:28px 32px; text-align:center; font-size:12.5px;">
    <a href="Home.dc.html" style="text-decoration:none; color:#CBB9AB;">Snap <span style="color:#E8795A;">✳</span> Page</a> &nbsp;·&nbsp; © 2026 · Lima, Perú
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { filtro: 'todos' };
  renderVals() {
    const labels = { todos: 'TODOS', parejas: 'PAREJAS', viajes: 'VIAJES', cumpleanos: 'CUMPLEAÑOS', familia: 'FAMILIA' };
    const data = [
      { cat: 'parejas', h: 300, caption: 'The Story of Us', ph: 'Photobook parejas' },
      { cat: 'viajes', h: 220, caption: 'Cusco, juntos', ph: 'Photobook viaje' },
      { cat: 'cumpleanos', h: 260, caption: 'los 30 de Andrea', ph: 'Photobook cumpleaños' },
      { cat: 'familia', h: 240, caption: 'domingos en casa', ph: 'Photobook familia' },
      { cat: 'parejas', h: 250, caption: 'nuestro aniversario', ph: 'Photobook aniversario' },
      { cat: 'viajes', h: 300, caption: 'Máncora 2025', ph: 'Photobook playa' },
      { cat: 'familia', h: 220, caption: 'bienvenida, Luna', ph: 'Photobook bebé' },
      { cat: 'cumpleanos', h: 280, caption: 'quinceañera', ph: 'Photobook quince' },
      { cat: 'parejas', h: 230, caption: "I'm in Love", ph: 'Photobook amor' },
    ];
    const rots = [-2, 1.5, -1, 2, -1.5, 1, -2.5, 1.8, -1.2];
    return {
      filtros: Object.keys(labels).map(k => ({
        label: labels[k],
        borde: this.state.filtro === k ? '#7B3A1E' : '#D8C4B2',
        bg: this.state.filtro === k ? '#7B3A1E' : 'transparent',
        color: this.state.filtro === k ? '#FBF7F2' : '#8A7568',
        elegir: () => this.setState({ filtro: k }),
      })),
      items: data
        .map((d, i) => ({ ...d, rot: rots[i], slotId: `gal-${i}` }))
        .filter(d => this.state.filtro === 'todos' || d.cat === this.state.filtro),
    };
  }
}
</script>
</body>
</html>
